                                        <option value="TWD">TWD 台幣</option>
                                        <option value="USD">USD 美元</option>
                                        <option value="JPY">JPY 日圓</option>
                                        <option value="EUR">EUR 歐元</option>
                                        <option value="GBP">GBP 英鎊</option>
                                        <option value="HKD">HKD 港幣</option>
                                        <option value="CNY">CNY 人民幣</option>
                                        <option value="SGD">SGD 新幣</option>
                                    </select>
                                </div>
                                <div class="form-field full">
                                    <label class="form-label">下次扣款日</label>
                                    <input id="sf_nextdate" class="form-input" type="date" />
                                </div>
                                <div class="form-field full">
                                    <label class="form-label">帳號</label>
                                    <input id="sf_account" class="form-input" type="text" placeholder="登入帳號或 Email" maxlength="100" />
                                </div>
                                <div class="form-field full">
                                    <label class="form-label">備註</label>
                                    <input id="sf_note" class="form-input" type="text" placeholder="備註說明" maxlength="100" />
                                </div>
                                <div class="form-field full">
                                    <div class="form-checkbox-row">
                                        <input id="sf_continue" class="form-checkbox" type="checkbox" checked />
                                        <label class="form-label" for="sf_continue" style="text-transform:none;font-size:13px">持續訂閱中</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-primary" id="subSaveBtn">💾 儲存</button>
                            <button class="btn btn-ghost" id="subCancelBtn">取消</button>
                        </div>
                    </div>
                </div>

                <!-- Bulk Delete Confirm Modal -->
                <div class="modal-overlay" id="subBulkModal" style="display:none">
                    <div class="modal" style="max-width:460px">
                        <div class="modal-header">
                            <span class="modal-title" style="color:#fc8b4a">⚠️ 確認批次刪除</span>
                            <div class="modal-close" id="subBulkClose">✕</div>
                        </div>
                        <div class="modal-body">
                            <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
                                即將刪除 <strong id="subBulkCount" style="color:#fc8b4a">0</strong> 筆訂閱記錄，此操作<strong>無法復原</strong>。
                            </p>
                            <p style="font-size:12px;color:var(--text-muted);margin-bottom:8px">請輸入以下文字以確認：</p>
                            <code style="display:block;padding:8px 12px;background:var(--bg-dark);border-radius:6px;font-size:13px;color:#f6e05e;margin-bottom:12px;border:1px solid var(--border)">DELETE subscription</code>
                            <input id="subBulkInput" class="settings-input" type="text" placeholder="輸入 DELETE subscription" autocomplete="off" />
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-danger" id="subBulkConfirmBtn" disabled>🗑️ 確認刪除</button>
                            <button class="btn btn-ghost" id="subBulkCancelBtn">取消</button>
                        </div>
                    </div>
                </div>`;
            return wrap;
        }

        function buildSubTable(docs) {
            if (!docs.length) {
                return `<div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div>尚無訂閱記錄，點右上角「＋ 新增訂閱」開始使用</div>
                </div>`;
            }
            const rows = docs.map(d => {
                const days = daysUntil(d.nextdate);
                const dayBadge = days == null ? '' :
                    days < 0 ? `<br><span style="color:#fc8b4a;font-size:10px">已過期 ${Math.abs(days)} 天</span>` :
                        days <= 7 ? `<br><span style="color:#f6e05e;font-size:10px">${days} 天後</span>` :
                            `<br><span style="color:var(--text-muted);font-size:10px">${days} 天後</span>`;
                const nameCell = d.site
                    ? `<a href="${d.site}" target="_blank" rel="noopener" class="td-link" style="color:var(--text-primary);font-weight:500">${d.name || '—'}</a><br><span style="font-size:10px;color:var(--text-muted)">${d.site}</span>`
                    : `${d.name || '—'}`;
                return `<tr>
                    <td style="width:36px;text-align:center"><input type="checkbox" class="sub-chk form-checkbox" data-id="${d.$id}"></td>
                    <td class="td-name">${nameCell}</td>
                    <td class="td-price">${fmtPrice(d.price, d.currency)}</td>
                    <td>${fmtDate(d.nextdate)}${dayBadge}</td>
                    <td>${d.account || '—'}</td>
                    <td>${d.note || '—'}</td>
                    <td><span class="status-badge ${d.continue !== false ? 'on' : 'off'}">${d.continue !== false ? '✓ 訂閱中' : '✗ 已停止'}</span></td>
                    <td>
                        <div class="td-actions">
                            <div class="icon-btn sub-edit-btn" data-id="${d.$id}" title="編輯">✏️</div>
                            <div class="icon-btn danger sub-del-btn" data-id="${d.$id}" data-name="${d.name}" title="刪除">🗑️</div>
                        </div>
                    </td>
                </tr>`;
            }).join('');
            return `<div class="data-table-wrap">
                <table class="data-table">
                    <thead><tr>
                        <th style="width:36px"><input type="checkbox" id="subCheckAll" class="form-checkbox" title="全選"></th>
                        <th>名稱</th><th>金額</th><th>下次扣款</th>
                        <th>帳號</th><th>備註</th><th>狀態</th><th>操作</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>`;
        }

        function bindSubscribeEvents(page) {
            let docs = [];
            let editingId = null;

            const body = page.querySelector('#subBody');
            const countEl = page.querySelector('#subCount');
            const modal = page.querySelector('#subModal');
            const modalTitle = page.querySelector('#subModalTitle');
            const modalErr = page.querySelector('#subModalErr');
            const saveBtn = page.querySelector('#subSaveBtn');
            const cancelBtn = page.querySelector('#subCancelBtn');

            const getForm = () => ({
                name: page.querySelector('#sf_name').value.trim(),
                site: page.querySelector('#sf_site').value.trim() || null,
                price: parseInt(page.querySelector('#sf_price').value) || 0,
                currency: page.querySelector('#sf_currency').value,
                nextdate: page.querySelector('#sf_nextdate').value
                    ? new Date(page.querySelector('#sf_nextdate').value).toISOString() : null,
                account: page.querySelector('#sf_account').value.trim() || null,
                note: page.querySelector('#sf_note').value.trim() || null,
                continue: page.querySelector('#sf_continue').checked,
            });

            const fillForm = (d = {}) => {
                page.querySelector('#sf_name').value = d.name || '';
                page.querySelector('#sf_site').value = d.site || '';
                page.querySelector('#sf_price').value = d.price ?? '';
                page.querySelector('#sf_currency').value = d.currency || 'TWD';
                page.querySelector('#sf_nextdate').value = d.nextdate ? d.nextdate.slice(0, 10) : '';
                page.querySelector('#sf_account').value = d.account || '';
                page.querySelector('#sf_note').value = d.note || '';
                page.querySelector('#sf_continue').checked = d.continue !== false;
            };

            const openModal = (doc = null) => {
                editingId = doc ? doc.$id : null;
                modalTitle.textContent = doc ? '編輯訂閱' : '新增訂閱';
                fillForm(doc || {});
                modalErr.style.display = 'none';
                modal.style.display = 'flex';
                page.querySelector('#sf_name').focus();
            };

            const closeModal = () => { modal.style.display = 'none'; editingId = null; };

            // 游標堆疊：每往下一頁就 push 當頁第一筆 $id；上一頁 pop
            let cursorStack = [];  // stack of first-doc $id of each page (for going back)
            let lastCursorAfter = null;  // $id of last doc in current page
            let totalDocs = 0;
            let currentPage = 1;

            const prevBtn = page.querySelector('#subPrevBtn');
            const nextBtn = page.querySelector('#subNextBtn');
            const pageInfoEl = page.querySelector('#subPageInfo');

            function totalLabel(n) {
                // Appwrite caps the total count at 5000; show '5000+' when hit
                return n >= 5000 ? '5000+ 筆 (Appwrite 顯示上限)' : `${n} 筆`;
            }

            function updatePageControls() {
                const hasMore = docs.length === PAGE_SIZE;
                pageInfoEl.textContent = `第 ${currentPage} 頁  / 共 ${totalLabel(totalDocs)}`;
                prevBtn.disabled = currentPage <= 1;
                nextBtn.disabled = !hasMore;
            }

            async function loadData(cursorAfter = null, cursorBefore = null) {
                body.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div><span>載入中…</span></div>';
                try {
                    const result = await fetchSubs(cursorAfter, cursorBefore);
                    docs = result.documents;
                    totalDocs = result.total;
                    // 若用 cursorBefore，Appwrite 傳回的順序可能相反，不需 reverse（Appwrite 保持原排序）
                    lastCursorAfter = docs.length ? docs[docs.length - 1].$id : null;
                    // Appwrite 的 total 在超過 5000 筆時會截斷為 5000，顯示時加上提示
                    countEl.textContent = totalLabel(totalDocs);
                    if (totalDocs >= 5000) countEl.title = 'Appwrite REST API 的 total 欄位最多顯示 5000，實際筆數可能更多，游標翻頁仍可正常存取全部資料';
                    updatePageControls();
                    body.innerHTML = buildSubTable(docs);
                    bindTableEvents();
                } catch (e) {
                    body.innerHTML = `<div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div style="color:#fc8b4a">${e.message}</div>
                    </div>`;
                }
            }

            prevBtn.addEventListener('click', async () => {
                if (currentPage <= 1) return;
                currentPage--;
                const prevCursor = cursorStack.pop() || null;  // pop to go back
                // When going back, we need the cursor for the page before current
                // cursorStack now has the cursor to the start of the current-1 page
                const backCursor = cursorStack.length ? cursorStack[cursorStack.length - 1] : null;
                await loadData(backCursor, null);
            });
            nextBtn.addEventListener('click', async () => {
                if (!lastCursorAfter) return;
                currentPage++;
                cursorStack.push(lastCursorAfter);
                await loadData(lastCursorAfter, null);
            });

            function bindTableEvents() {
                body.querySelectorAll('.sub-edit-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const doc = docs.find(d => d.$id === btn.dataset.id);
                        if (doc) openModal(doc);
                    });
                });
                body.querySelectorAll('.sub-del-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        if (!confirm(`確定刪除「${btn.dataset.name}」嗎？`)) return;
                        btn.textContent = '⏳';
                        try {
                            await deleteSub(btn.dataset.id);
                            await loadData();
                        } catch (e) {
                            alert('刪除失敗：' + e.message);
                            btn.textContent = '🗑️';
                        }
                    });
                });
            }

            // wire up modal controls
            page.querySelector('#subAddBtn').addEventListener('click', () => openModal());
            page.querySelector('#subModalClose').addEventListener('click', closeModal);
            cancelBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

            // save button
            saveBtn.addEventListener('click', async () => {
                const fd = getForm();
                if (!fd.name) {
                    modalErr.textContent = '⚠️ 名稱為必填欄位';
                    modalErr.style.display = 'flex';
                    return;
                }
                modalErr.style.display = 'none';
                saveBtn.disabled = true;
                saveBtn.textContent = '⏳ 儲存中…';
                try {
                    await saveSub(fd, editingId);
                    closeModal();
                    await loadData();
                } catch (e) {
                    modalErr.textContent = '❌ ' + e.message;
                    modalErr.style.display = 'flex';
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.textContent = '💾 儲存';
                }
            });

            // keyboard ESC closes modal
            document.addEventListener('keydown', function escHandler(e) {
                if (e.key === 'Escape' && modal.style.display !== 'none') closeModal();
                if (!page.isConnected) document.removeEventListener('keydown', escHandler);
            });

            /* ── Selection & Bulk Delete ── */
            const bulkDelBtn = page.querySelector('#subBulkDelBtn');
            const bulkModal = page.querySelector('#subBulkModal');
            const bulkCount = page.querySelector('#subBulkCount');
            const bulkInput = page.querySelector('#subBulkInput');
            const bulkConfirm = page.querySelector('#subBulkConfirmBtn');

            const CONFIRM_PHRASE = 'DELETE subscription';

            function getSelectedIds() {
                return [...body.querySelectorAll('.sub-chk:checked')].map(c => c.dataset.id);
            }

            function updateSelUI() {
                const sel = getSelectedIds();
                const n = sel.length;
                const pageCount = body.querySelectorAll('.sub-chk').length;
                // Update count badge: show total + selection info
                countEl.textContent = n > 0
                    ? `${totalDocs} 筆 ／ 已選 ${n}`
                    : `${totalDocs} 筆`;
                bulkDelBtn.style.display = n > 0 ? '' : 'none';
                // sync select-all checkbox state
                const chkAll = body.querySelector('#subCheckAll');
                if (chkAll && pageCount) {
                    chkAll.indeterminate = n > 0 && n < pageCount;
                    chkAll.checked = n === pageCount;
                }
            }

            // Delegate selection changes from table body
            body.addEventListener('change', e => {
                if (e.target.id === 'subCheckAll') {
                    body.querySelectorAll('.sub-chk').forEach(c => c.checked = e.target.checked);
                }
                updateSelUI();
            });

            // Open bulk confirm modal
            bulkDelBtn.addEventListener('click', () => {
                const ids = getSelectedIds();
                if (!ids.length) return;
                bulkCount.textContent = ids.length;
                bulkInput.value = '';
                bulkConfirm.disabled = true;
                bulkModal.style.display = 'flex';
                bulkInput.focus();
            });

            const closeBulkModal = () => { bulkModal.style.display = 'none'; };
            page.querySelector('#subBulkClose').addEventListener('click', closeBulkModal);
            page.querySelector('#subBulkCancelBtn').addEventListener('click', closeBulkModal);
            bulkModal.addEventListener('click', e => { if (e.target === bulkModal) closeBulkModal(); });

            // Enable confirm button only when phrase matches exactly
            bulkInput.addEventListener('input', () => {
                bulkConfirm.disabled = bulkInput.value.trim() !== CONFIRM_PHRASE;
            });

            // Execute bulk delete
            bulkConfirm.addEventListener('click', async () => {
                const ids = getSelectedIds();
                if (!ids.length) return;
                bulkConfirm.disabled = true;
                bulkConfirm.textContent = `⏳ 0/${ids.length}`;
                let ok = 0, fail = 0;
                for (let i = 0; i < ids.length; i++) {
                    try { await deleteSub(ids[i]); ok++; }
                    catch { fail++; }
                    bulkConfirm.textContent = `⏳ ${i + 1}/${ids.length}`;
                }
                closeBulkModal();
                bulkDelBtn.style.display = 'none';
                bulkConfirm.textContent = '🗑️ 確認刪除';
                if (fail) alert(`刪除完成：成功 ${ok} 筆，失敗 ${fail} 筆`);
                await loadData();
            });

            /* ── Scroll buttons ── */
            page.querySelector('#subScrollTop').addEventListener('click', () => {
                body.scrollTo({ top: 0, behavior: 'smooth' });
            });
            page.querySelector('#subScrollBot').addEventListener('click', () => {
                body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' });
            });

            /* ── CSV Export ── */
            // Header matches Appwrite subscription schema field names exactly
            const CSV_HEADER = '$id,name,site,price,nextdate,note,account,currency,continue,$createdAt,$updatedAt';

            page.querySelector('#subExportBtn').addEventListener('click', () => {
                if (!docs.length) { alert('目前沒有資料可匯出'); return; }
                const escape = v => `"${String(v ?? '').replace(/"/g, '""')}"`;
                const rows = docs.map(d => [
                    escape(d.$id ?? ''),
                    escape(d.name ?? ''),
                    escape(d.site ?? ''),
                    d.price ?? 0,
                    d.nextdate ? d.nextdate.slice(0, 10) : '',
                    escape(d.note ?? ''),
                    escape(d.account ?? ''),
                    escape(d.currency ?? 'TWD'),
                    d.continue !== false ? 'true' : 'false',
                    d.$createdAt ? d.$createdAt.slice(0, 19).replace('T', ' ') : '',
                    d.$updatedAt ? d.$updatedAt.slice(0, 19).replace('T', ' ') : '',
                ].join(','));
                const bom = '\uFEFF'; // UTF-8 BOM for Excel
                const csv = bom + CSV_HEADER + '\n' + rows.join('\n');
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
                const _nick = (getAppwriteConfig().nickname || 'user').trim().replace(/\s+/g, '_');
                const _date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                a.download = `appwrite-${_nick}-subscription-${_date}.csv`;
                a.click();
                URL.revokeObjectURL(a.href);
            });

            /* ── CSV Import ── */
            // Accepts headers matching Appwrite field names (case-insensitive).
            // $id, $createdAt, $updatedAt are ignored (read-only in Appwrite).
            const fileInput = page.querySelector('#subImportFile');
            page.querySelector('#subImportBtn').addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', async () => {
                const file = fileInput.files[0];
                if (!file) return;
                fileInput.value = '';
                const text = await file.text();
                const lines = text.replace(/\r/g, '').split('\n').filter(l => l.trim());
                if (lines.length < 2) { alert('沒有資料列（至少需要標題列和一筆資料）'); return; }

                const parseRow = raw => {
                    const result = [];
                    let cur = '', inQ = false;
                    for (const ch of raw) {
                        if (ch === '"') { inQ = !inQ; continue; }
                        if (ch === ',' && !inQ) { result.push(cur); cur = ''; continue; }
                        cur += ch;
                    }
                    result.push(cur);
                    return result;
                };

                const hdrs = parseRow(lines[0].replace(/^\uFEFF/, '')).map(h => h.trim().toLowerCase());
                const col = k => hdrs.indexOf(k.toLowerCase());
                const get = (cells, k) => { const i = col(k); return i >= 0 ? cells[i]?.trim() : ''; };

                const dataRows = lines.slice(1);
                let ok = 0, fail = 0;
                const importBtn = page.querySelector('#subImportBtn');
                importBtn.disabled = true;
                importBtn.textContent = `⏳ 0/${dataRows.length}`;

                for (let i = 0; i < dataRows.length; i++) {
                    const cells = parseRow(dataRows[i]);
                    const name = get(cells, 'name');
                    if (!name) { fail++; continue; }
                    // $id, $createdAt, $updatedAt are read-only — skip on import
                    const fd = {
                        name,
                        site: get(cells, 'site') || null,
                        price: parseInt(get(cells, 'price')) || 0,
                        currency: get(cells, 'currency') || 'TWD',
                        nextdate: get(cells, 'nextdate') ? new Date(get(cells, 'nextdate')).toISOString() : null,
                        account: get(cells, 'account') || null,
                        note: get(cells, 'note') || null,
                        continue: get(cells, 'continue') !== 'false',
                    };
                    try { await saveSub(fd); ok++; }
                    catch { fail++; }
                    importBtn.textContent = `⏳ ${i + 1}/${dataRows.length}`;
                }

                importBtn.disabled = false;
                importBtn.textContent = '⬆️ 匯入 CSV';
                alert(`匯入完成！成功 ${ok} 筆，失敗 ${fail} 筆`);
                await loadData();
            });

            loadData();
        }

        /* ── Navigation ── */
        const contentArea = document.getElementById('contentArea');
        const defaultPlaceholder = document.getElementById('defaultPlaceholder');

        function navigate(id) {
            activeId = id;
            const item = MENU.find(m => m.id === id);
            if (!item) return;

            // update topbar
            topbarIcon.textContent = item.icon;
            topbarName.textContent = item.label;
            topbarBadge.textContent = item.badge;

            // clear previous panel
            contentArea.querySelectorAll('.settings-panel, .page-panel').forEach(el => el.remove());

            if (id === 'settings') {
                defaultPlaceholder.style.display = 'none';
                contentArea.classList.remove('full-page');
                const panel = renderSettings();
                contentArea.appendChild(panel);
                bindSettingsEvents(panel);
            } else if (id === 'subscribe') {
                defaultPlaceholder.style.display = 'none';
                contentArea.classList.add('full-page');
                const page = renderSubscribePage();
                contentArea.appendChild(page);
                bindSubscribeEvents(page);
            } else {
                contentArea.classList.remove('full-page');
                defaultPlaceholder.style.display = '';
                defaultPlaceholder.innerHTML = `
                    <div class="placeholder-icon">${item.icon}</div>
                    <div class="placeholder-wip-badge">🚧 建置中</div>
                    <div class="placeholder-text">${item.label} — 尚待實作</div>
                `;
            }

            renderNav();
        }

        function toggleSidebar() {
            collapsed = !collapsed;
            sidebar.classList.toggle('collapsed', collapsed);
        }

        toggleBtn.addEventListener('click', toggleSidebar);
        document.getElementById('brandBtn').addEventListener('click', toggleSidebar);

        // init
        function refreshAvatar() {
            const cfg = getAppwriteConfig();
            const av = document.getElementById('topbarAvatar');
            if (!av) return;
            const name = (cfg.nickname || '鋒').trim();
            av.textContent = name.charAt(0) || '鋒';
            av.title = name || '鋒兄';
        }

        renderNav();
        refreshAvatar();
    </script>
</body>

</html>
