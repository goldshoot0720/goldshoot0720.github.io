<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鋒兄系統</title>
  <meta name="description" content="鋒兄個人管理系統 - 涵蓋儀表、訂閱、筆記、音樂等多功能管理介面" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --sidebar-width: 240px;
      --sidebar-collapsed: 68px;
      --bg-dark: #0d0f14;
      --bg-panel: #13161e;
      --bg-card: #1a1e2a;
      --bg-hover: #1f2436;
      --bg-active: rgba(99, 179, 237, 0.12);
      --border: rgba(255,255,255,0.07);
      --accent: #63b3ed;
      --accent-2: #9f7aea;
      --text-primary: #e8eaf0;
      --text-secondary: #7a8199;
      --text-muted: #4a5068;
      --gradient-1: linear-gradient(135deg, #63b3ed 0%, #9f7aea 100%);
      --gradient-sidebar: linear-gradient(180deg, #0f1219 0%, #0d0f14 100%);
      --shadow-glow: 0 0 20px rgba(99,179,237,0.15);
      --radius: 12px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans TC', 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      height: 100%;
      background: var(--gradient-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: width var(--transition), min-width var(--transition);
      overflow: hidden;
      position: relative;
      z-index: 100;
    }

    .sidebar.collapsed {
      width: var(--sidebar-collapsed);
      min-width: var(--sidebar-collapsed);
    }

    /* Sidebar top glow line */
    .sidebar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--gradient-1);
      opacity: 0.6;
    }

    /* ── Logo / Brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 22px 18px 18px;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 10px;
      background: var(--gradient-1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: var(--shadow-glow);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .brand:hover .brand-icon {
      transform: scale(1.08);
      box-shadow: 0 0 28px rgba(99,179,237,0.35);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      opacity: 1;
      transition: opacity var(--transition);
    }

    .sidebar.collapsed .brand-text {
      opacity: 0;
      pointer-events: none;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }

    .brand-sub {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.8px;
      margin-top: 1px;
    }

    /* ── Nav ── */
    .nav {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 12px 0;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }

    .nav-section {
      padding: 0 10px;
    }

    .nav-section + .nav-section {
      margin-top: 4px;
    }

    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 18px;
      opacity: 0.6;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      white-space: nowrap;
      overflow: hidden;
      position: relative;
      user-select: none;
    }

    .nav-item:hover {
      background: var(--bg-hover);
      transform: translateX(2px);
    }

    .nav-item.active {
      background: var(--bg-active);
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20%;
      bottom: 20%;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--gradient-1);
    }

    .nav-icon {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: var(--bg-card);
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
      border: 1px solid var(--border);
    }

    .nav-item:hover .nav-icon {
      background: var(--bg-hover);
      transform: scale(1.05);
    }

    .nav-item.active .nav-icon {
      background: rgba(99,179,237,0.15);
      border-color: rgba(99,179,237,0.3);
      box-shadow: 0 0 12px rgba(99,179,237,0.2);
    }

    .nav-label {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: color var(--transition), opacity var(--transition);
      opacity: 1;
    }

    .sidebar.collapsed .nav-label {
      opacity: 0;
      pointer-events: none;
    }

    .nav-item.active .nav-label {
      color: var(--accent);
      font-weight: 600;
    }

    /* tooltip for collapsed state */
    .nav-item[data-tooltip] {
      position: relative;
    }

    .sidebar.collapsed .nav-item::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(100% + 14px);
      top: 50%;
      transform: translateY(-50%) scale(0.9);
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 999;
    }

    .sidebar.collapsed .nav-item:hover::after {
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    /* ── Toggle Button ── */
    .sidebar-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      transition: background var(--transition);
      user-select: none;
    }

    .sidebar-toggle:hover {
      background: var(--bg-hover);
    }

    .toggle-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 14px;
      transition: transform var(--transition), color var(--transition), background var(--transition);
    }

    .sidebar.collapsed .toggle-btn {
      transform: rotate(180deg);
    }

    .sidebar-toggle:hover .toggle-btn {
      background: var(--bg-hover);
      color: var(--accent);
    }

    /* ── Main Content ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-dark);
    }

    /* ── Topbar ── */
    .topbar {
      height: 60px;
      min-height: 60px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,15,20,0.8);
      backdrop-filter: blur(12px);
      justify-content: space-between;
    }

    .topbar-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-icon {
      font-size: 20px;
    }

    .topbar-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.3px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-badge {
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--bg-active);
      border: 1px solid rgba(99,179,237,0.2);
      font-size: 11px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--gradient-1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: box-shadow var(--transition);
    }

    .avatar:hover {
      box-shadow: var(--shadow-glow);
    }

    /* ── Content Area ── */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 32px;
    }

    .content-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0.25;
      pointer-events: none;
      animation: fadeIn 0.5s ease;
    }

    .placeholder-icon {
      font-size: 64px;
      filter: grayscale(1);
    }

    .placeholder-text {
      font-size: 15px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 0.25; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .nav-item {
      animation: slideIn 0.3s ease both;
    }
  </style>
</head>
<body>
  <div class="app" id="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">

      <div class="brand" id="brandBtn" title="鋒兄系統">
        <div class="brand-icon">⚡</div>
        <div class="brand-text">
          <div class="brand-name">鋒兄系統</div>
          <div class="brand-sub">FENG BRO SYSTEM</div>
        </div>
      </div>

      <nav class="nav" id="nav">
        <div class="nav-section" id="navList"></div>
      </nav>

      <div class="sidebar-toggle" id="toggleBtn" title="收合選單">
        <div class="toggle-btn">◀</div>
      </div>

    </aside>

    <!-- ── Main ── -->
    <div class="main">

      <header class="topbar">
        <div class="topbar-title">
          <span class="topbar-icon" id="topbarIcon">🏠</span>
          <span class="topbar-name" id="topbarName">鋒兄首頁</span>
        </div>
        <div class="topbar-actions">
          <span class="topbar-badge" id="topbarBadge">首頁</span>
          <div class="avatar" title="鋒兄">鋒</div>
        </div>
      </header>

      <main class="content">
        <div class="content-placeholder">
          <div class="placeholder-icon" id="placeholderIcon">🏠</div>
          <div class="placeholder-text" id="placeholderText">內容區域 — 尚待建置</div>
        </div>
      </main>

    </div>
  </div>

  <script>
    const MENU = [
      { id: 'home',       label: '鋒兄首頁', icon: '🏠', badge: '首頁' },
      { id: 'dashboard',  label: '鋒兄儀表', icon: '📊', badge: '儀表' },
      { id: 'subscribe',  label: '鋒兄訂閱', icon: '📬', badge: '訂閱' },
      { id: 'food',       label: '鋒兄食品', icon: '🍱', badge: '食品' },
      { id: 'notes',      label: '鋒兄筆記', icon: '📝', badge: '筆記' },
      { id: 'common',     label: '鋒兄常用', icon: '⭐', badge: '常用' },
      { id: 'images',     label: '鋒兄圖片', icon: '🖼️', badge: '圖片' },
      { id: 'videos',     label: '鋒兄影片', icon: '🎬', badge: '影片' },
      { id: 'music',      label: '鋒兄音樂', icon: '🎵', badge: '音樂' },
      { id: 'docs',       label: '鋒兄文件', icon: '📄', badge: '文件' },
      { id: 'podcast',    label: '鋒兄播客', icon: '🎙️', badge: '播客' },
      { id: 'bank',       label: '鋒兄銀行', icon: '🏦', badge: '銀行' },
      { id: 'routine',    label: '鋒兄例行', icon: '🔄', badge: '例行' },
      { id: 'settings',   label: '鋒兄設定', icon: '⚙️', badge: '設定' },
      { id: 'about',      label: '鋒兄關於', icon: 'ℹ️', badge: '關於' },
    ];

    let activeId = 'home';
    let collapsed = false;

    const sidebar     = document.getElementById('sidebar');
    const navList     = document.getElementById('navList');
    const toggleBtn   = document.getElementById('toggleBtn');
    const topbarIcon  = document.getElementById('topbarIcon');
    const topbarName  = document.getElementById('topbarName');
    const topbarBadge = document.getElementById('topbarBadge');
    const placeholderIcon = document.getElementById('placeholderIcon');
    const placeholderText = document.getElementById('placeholderText');

    function renderNav() {
      navList.innerHTML = '';
      MENU.forEach((item, i) => {
        // divider before settings & about
        if (i === 13) {
          const div = document.createElement('div');
          div.className = 'nav-divider';
          navList.appendChild(div);
        }

        const el = document.createElement('div');
        el.className = 'nav-item' + (item.id === activeId ? ' active' : '');
        el.setAttribute('data-id', item.id);
        el.setAttribute('data-tooltip', item.label);
        el.style.animationDelay = `${i * 0.03}s`;
        el.innerHTML = `
          <div class="nav-icon">${item.icon}</div>
          <span class="nav-label">${item.label}</span>
        `;
        el.addEventListener('click', () => navigate(item.id));
        navList.appendChild(el);
      });
    }

    function navigate(id) {
      activeId = id;
      const item = MENU.find(m => m.id === id);
      if (!item) return;

      // update topbar
      topbarIcon.textContent  = item.icon;
      topbarName.textContent  = item.label;
      topbarBadge.textContent = item.badge;

      // update placeholder
      placeholderIcon.textContent = item.icon;
      placeholderText.textContent = `${item.label} — 內容尚待建置`;

      // re-render nav to update active state
      renderNav();
    }

    function toggleSidebar() {
      collapsed = !collapsed;
      sidebar.classList.toggle('collapsed', collapsed);
    }

    toggleBtn.addEventListener('click', toggleSidebar);
    document.getElementById('brandBtn').addEventListener('click', toggleSidebar);

    // init
    renderNav();
  </script>
</body>
</html>
