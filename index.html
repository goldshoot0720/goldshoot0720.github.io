<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <title>鋒兄系統</title>
    <meta name="description" content="鋒兄個人管理系統 - 涵蓋儀表、訂閱、筆記、音樂等多功能管理介面" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed: 68px;
            --bg-dark: #0d0f14;
            --bg-panel: #13161e;
            --bg-card: #1a1e2a;
            --bg-hover: #1f2436;
            --bg-active: rgba(99, 179, 237, 0.12);
            --border: rgba(255, 255, 255, 0.07);
            --accent: #63b3ed;
            --accent-2: #9f7aea;
            --text-primary: #e8eaf0;
            --text-secondary: #7a8199;
            --text-muted: #4a5068;
            --gradient-1: linear-gradient(135deg, #63b3ed 0%, #9f7aea 100%);
            --gradient-sidebar: linear-gradient(180deg, #0f1219 0%, #0d0f14 100%);
            --shadow-glow: 0 0 20px rgba(99, 179, 237, 0.15);
            --radius: 12px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html,
        body {
            height: 100%;
            font-family: 'Noto Sans TC', 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ── Layout ── */
        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* auto-collapse sidebar when effective viewport is narrow (e.g. 150% zoom) */
        @media (max-width: 960px) {
            :root {
                --sidebar-width: var(--sidebar-collapsed);
            }

            .sidebar {
                width: var(--sidebar-collapsed) !important;
                min-width: var(--sidebar-collapsed) !important;
            }

            .brand-text,
            .nav-label {
                opacity: 0 !important;
                pointer-events: none;
            }

            .toggle-btn {
                transform: rotate(180deg);
            }
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100%;
            background: var(--gradient-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width var(--transition), min-width var(--transition);
            overflow: hidden;
            position: relative;
            z-index: 100;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
            min-width: var(--sidebar-collapsed);
        }

        /* Sidebar top glow line */
        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gradient-1);
            opacity: 0.6;
        }

        /* ── Logo / Brand ── */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 18px 18px;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 10px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: var(--shadow-glow);
            transition: transform var(--transition), box-shadow var(--transition);
        }

        .brand:hover .brand-icon {
            transform: scale(1.08);
            box-shadow: 0 0 28px rgba(99, 179, 237, 0.35);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            opacity: 1;
            transition: opacity var(--transition);
        }

        .sidebar.collapsed .brand-text {
            opacity: 0;
            pointer-events: none;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        .brand-sub {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.8px;
            margin-top: 1px;
        }

        /* ── Nav ── */
        .nav {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 0;
            scrollbar-width: none;
        }

        .nav::-webkit-scrollbar {
            display: none;
        }

        .nav-section {
            padding: 0 10px;
        }

        .nav-section+.nav-section {
            margin-top: 4px;
        }

        .nav-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 18px;
            opacity: 0.6;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition);
            white-space: nowrap;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            transform: translateX(2px);
        }

        .nav-item.active {
            background: var(--bg-active);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: var(--gradient-1);
        }

        .nav-icon {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--bg-card);
            transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
            border: 1px solid var(--border);
        }

        .nav-item:hover .nav-icon {
            background: var(--bg-hover);
            transform: scale(1.05);
        }

        .nav-item.active .nav-icon {
            background: rgba(99, 179, 237, 0.15);
            border-color: rgba(99, 179, 237, 0.3);
            box-shadow: 0 0 12px rgba(99, 179, 237, 0.2);
        }

        .nav-label {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color var(--transition), opacity var(--transition);
            opacity: 1;
        }

        .sidebar.collapsed .nav-label {
            opacity: 0;
            pointer-events: none;
        }

        .nav-item.active .nav-label {
            color: var(--accent);
            font-weight: 600;
        }

        /* tooltip for collapsed state */
        .nav-item[data-tooltip] {
            position: relative;
        }

        .sidebar.collapsed .nav-item::after {
            content: attr(data-tooltip);
            position: absolute;
            left: calc(100% + 14px);
            top: 50%;
            transform: translateY(-50%) scale(0.9);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s, transform 0.15s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            z-index: 999;
        }

        .sidebar.collapsed .nav-item:hover::after {
            opacity: 1;
            transform: translateY(-50%) scale(1);
        }

        /* ── Toggle Button ── */
        .sidebar-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-top: 1px solid var(--border);
            cursor: pointer;
            transition: background var(--transition);
            user-select: none;
        }

        .sidebar-toggle:hover {
            background: var(--bg-hover);
        }

        .toggle-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 14px;
            transition: transform var(--transition), color var(--transition), background var(--transition);
        }

        .sidebar.collapsed .toggle-btn {
            transform: rotate(180deg);
        }

        .sidebar-toggle:hover .toggle-btn {
            background: var(--bg-hover);
            color: var(--accent);
        }

        /* ── Main Content ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-dark);
        }

        /* ── Topbar ── */
        .topbar {
            height: 60px;
            min-height: 60px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 15, 20, 0.8);
            backdrop-filter: blur(12px);
            justify-content: space-between;
        }

        .topbar-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-icon {
            font-size: 20px;
        }

        .topbar-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.3px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-badge {
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--bg-active);
            border: 1px solid rgba(99, 179, 237, 0.2);
            font-size: 11px;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: box-shadow var(--transition);
        }

        .avatar:hover {
            box-shadow: var(--shadow-glow);
        }

        /* ── Content Area ── */
        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 32px;
        }

        .content.full-page {
            align-items: flex-start;
            justify-content: flex-start;
            padding: 0;
        }

        .content-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            pointer-events: none;
            animation: fadeIn 0.5s ease;
        }

        .placeholder-icon {
            font-size: 64px;
            filter: grayscale(0.4);
            opacity: 0.6;
        }

        .placeholder-wip-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: rgba(246, 224, 94, 0.1);
            border: 1px solid rgba(246, 224, 94, 0.3);
            color: #f6e05e;
        }

        /* ── Page Panel (full-width pages) ── */
        .page-panel {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: contentFadeIn 0.3s ease;
        }

        .page-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.015);
            flex-shrink: 0;
        }

        .page-toolbar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            flex: 1;
        }

        .page-toolbar-count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .page-body {
            flex: 1;
            overflow: auto;
            padding: 20px 24px;
        }

        /* ── Data Table ── */
        .data-table-wrap {
            width: 100%;
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table thead tr {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            padding: 10px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .data-table td {
            padding: 11px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            vertical-align: middle;
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .data-table tbody tr:hover td {
            background: var(--bg-hover);
        }

        .data-table .td-name {
            color: var(--text-primary);
            font-weight: 500;
        }

        .data-table .td-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 12px;
        }

        .data-table .td-link:hover {
            text-decoration: underline;
        }

        .data-table .td-price {
            font-weight: 600;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid;
        }

        .status-badge.on {
            background: rgba(72, 187, 120, 0.1);
            border-color: rgba(72, 187, 120, 0.25);
            color: #68d391;
        }

        .status-badge.off {
            background: rgba(113, 128, 150, 0.1);
            border-color: rgba(113, 128, 150, 0.2);
            color: var(--text-muted);
        }

        .td-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-muted);
            transition: all var(--transition);
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .icon-btn.danger:hover {
            background: rgba(252, 129, 74, 0.15);
            color: #fc8b4a;
            border-color: rgba(252, 129, 74, 0.3);
        }

        /* ── Spinner ── */
        .spinner-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 60px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 60px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .empty-state-icon {
            font-size: 40px;
            opacity: 0.3;
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeOverlay 0.2s ease;
        }

        @keyframes fadeOverlay {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 540px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.94) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-muted);
            transition: all var(--transition);
        }

        .modal-close:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-field.full {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .form-label .required {
            color: #fc8b4a;
            margin-left: 2px;
        }

        .form-input,
        .form-select {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus,
        .form-select:focus {
            border-color: rgba(99, 179, 237, 0.4);
            box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.08);
        }

        .form-select {
            appearance: none;
            cursor: pointer;
        }

        .form-checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-checkbox {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
        }

        .placeholder-text {
            font-size: 15px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* ── Settings Panel ── */
        .settings-panel {
            width: 100%;
            max-width: 720px;
            align-self: flex-start;
            /* prevent center-overflow clipping at high zoom */
            margin: 0 auto;
            /* keep horizontal centering */
            animation: contentFadeIn 0.35s ease;
        }

        @keyframes contentFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .settings-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .settings-section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .settings-section-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-active);
            border: 1px solid rgba(99, 179, 237, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .settings-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .settings-section-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .settings-conn-badge {
            margin-left: auto;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid;
            transition: all var(--transition);
        }

        .settings-conn-badge.connected {
            background: rgba(72, 187, 120, 0.12);
            border-color: rgba(72, 187, 120, 0.3);
            color: #68d391;
        }

        .settings-conn-badge.disconnected {
            background: rgba(252, 129, 74, 0.1);
            border-color: rgba(252, 129, 74, 0.25);
            color: #fc8b4a;
        }

        .settings-conn-badge.testing {
            background: rgba(99, 179, 237, 0.1);
            border-color: rgba(99, 179, 237, 0.25);
            color: var(--accent);
        }

        .settings-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .settings-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .settings-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .settings-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: -2px;
        }

        .settings-input {
            width: 100%;
            background: var(--bg-dark);

            border-radius: 8px;

            font-family: inherit;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all var(--transition);

        .btn-primary {
            background: var(--gradient-1);
            color: #fff;
            box-shadow: 0 2px 12px rgba(99, 179, 237, 0.25);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 20px rgba(99, 179, 237, 0.4);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: var(--bg-dark);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-danger {
            background: rgba(252, 129, 74, 0.1);
            color: #fc8b4a;
            border: 1px solid rgba(252, 129, 74, 0.2);
        }

        .btn-danger:hover {
            background: rgba(252, 129, 74, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .settings-toast {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12.5px;
            margin-bottom: 12px;

        .settings-toast.success {
            background: rgba(72, 187, 120, 0.1);
            border: 1px solid rgba(72, 187, 120, 0.25);
            color: #68d391;
        }

        .settings-toast.error {
            background: rgba(252, 129, 74, 0.1);
            border: 1px solid rgba(252, 129, 74, 0.25);
            color: #fc8b4a;
        }

        /* ── Animations ── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 0.25;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-8px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .nav-item {
            animation: slideIn 0.3s ease both;
        }
    </style>
</head>

<body>

                </div>

        </div>
    </div>

    <script>
        const MENU = [
            { id: 'home', label: '鋒兄首頁', icon: '🏠', badge: '首頁' },
            { id: 'dashboard', label: '鋒兄儀表', icon: '📊', badge: '儀表' },
            { id: 'subscribe', label: '鋒兄訂閱', icon: '📬', badge: '訂閱' },
            { id: 'food', label: '鋒兄食品', icon: '🍱', badge: '食品' },
            { id: 'notes', label: '鋒兄筆記', icon: '📝', badge: '筆記' },
            { id: 'common', label: '鋒兄常用', icon: '⭐', badge: '常用' },
            { id: 'images', label: '鋒兄圖片', icon: '🖼️', badge: '圖片' },
            { id: 'videos', label: '鋒兄影片', icon: '🎬', badge: '影片' },
            { id: 'music', label: '鋒兄音樂', icon: '🎵', badge: '音樂' },
            { id: 'docs', label: '鋒兄文件', icon: '📄', badge: '文件' },
            { id: 'podcast', label: '鋒兄播客', icon: '🎙️', badge: '播客' },
            { id: 'bank', label: '鋒兄銀行', icon: '🏦', badge: '銀行' },
            { id: 'routine', label: '鋒兄例行', icon: '🔄', badge: '例行' },
            { id: 'settings', label: '鋒兄設定', icon: '⚙️', badge: '設定' },
            { id: 'about', label: '鋒兄關於', icon: 'ℹ️', badge: '關於' },
        ];

        let activeId = 'home';
        let collapsed = false;

        const sidebar = document.getElementById('sidebar');
        const navList = document.getElementById('navList');
        const toggleBtn = document.getElementById('toggleBtn');
        const topbarIcon = document.getElementById('topbarIcon');
        const topbarName = document.getElementById('topbarName');
        const topbarBadge = document.getElementById('topbarBadge');
        const placeholderIcon = document.getElementById('placeholderIcon');
        const placeholderText = document.getElementById('placeholderText');

        function renderNav() {
            navList.innerHTML = '';
            MENU.forEach((item, i) => {
                // divider before settings & about
                if (i === 13) {
                    const div = document.createElement('div');
                    div.className = 'nav-divider';
                    navList.appendChild(div);
                }

                const el = document.createElement('div');
                el.className = 'nav-item' + (item.id === activeId ? ' active' : '');
                el.setAttribute('data-id', item.id);
                el.setAttribute('data-tooltip', item.label);
                el.style.animationDelay = `${i * 0.03}s`;
                el.innerHTML = `
          <div class="nav-icon">${item.icon}</div>
          <span class="nav-label">${item.label}</span>
        `;
                el.addEventListener('click', () => navigate(item.id));
                navList.appendChild(el);
            });
        }

        /* ── Appwrite Table Auto-mapping ── */
        const TABLE_MAP = {
            home: null,
            dashboard: null,
            subscribe: 'subscription',
            food: 'foods',
            notes: 'notes',
            common: 'commons',
            images: 'images',
            videos: 'videos',
            music: 'music',
            docs: 'documents',
            podcast: 'podcasts',
            bank: 'bank',
            routine: 'routines',
            settings: null,
            about: null,
        };

        /** 取得當前頁面對應的 Appwrite collection 名稱 */
        function getTableName(pageId) {
            return TABLE_MAP[pageId] || null;
        }

        /* ── Settings / Profile Storage ── */
        const APPWRITE_KEY = 'feng_appwrite_cfg';   // legacy (migration)
        const PROFILES_KEY = 'feng_profiles';
        const ACTIVE_KEY = 'feng_active_profile';

        const APPWRITE_DEFAULTS = {
            endpoint: 'https://tor.cloud.appwrite.io/v1',
            projectId: '69836152003d00c0279a',
            apiKey: 'standard_69882a84f42f0170da80c05d2183cac2f71a531ca044b71f093ffbed3978bc73c721b6a15263a32fee437eaa15a81048795876100bd8eb31361592d0b69ec843a5a4e0d327386452b7292c09d99ffd42c899f63f06df86a071b58c738118efbe794a7de788e6e629623d26d510ff07757de942d7852739e0c409d52a19e553a2',
        };
        const SUPABASE_DEFAULTS = {
            nickname: '',
            endpoint: 'https://busgjgbvlrlbyolsubcj.supabase.co',
            projectId: 'busgjgbvlrlbyolsubcj',
            apiKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1c2dqZ2J2bHJsYnlvbHN1YmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyNDMzMTEsImV4cCI6MjA4MTgxOTMxMX0.OsIW2wWqEn6bTo_7oW2RY8gAyIy87dydw1EWFMa9GQc',
            bucket: '',
        };

        function getDefaultsByProvider(provider) {
            return provider === 'supabase' ? SUPABASE_DEFAULTS : APPWRITE_DEFAULTS;
        }

        function _newId() { return String(Date.now()); }

        /** 讀取所有設定檔（含舊資料自動遷移） */
        function loadProfiles() {
            try {
                const raw = localStorage.getItem(PROFILES_KEY);
                if (raw) return JSON.parse(raw);
                // migrate legacy
                const legacy = JSON.parse(localStorage.getItem(APPWRITE_KEY) || '{}');
                const nick = legacy.nickname || 'default';
                const id = _newId();
                const migrated = [{ id, name: `Appwrite-${nick}`, provider: 'appwrite', ...legacy }];
                localStorage.setItem(PROFILES_KEY, JSON.stringify(migrated));
                localStorage.setItem(ACTIVE_KEY, id);
                return migrated;
            } catch { return []; }
        }

        function saveProfiles(profiles) {
            localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
        }

        function getActiveId() {
            const id = localStorage.getItem(ACTIVE_KEY);
            const profiles = loadProfiles();
            if (profiles.find(p => p.id === id)) return id;
            return profiles[0]?.id || null;
        }

        function setActiveId(id) {
            localStorage.setItem(ACTIVE_KEY, id);
        }

        /** 取得目前活躍設定檔（合併預設值） */
        function getAppwriteConfig() {
            const profiles = loadProfiles();
            const activeId = getActiveId();
            const profile = profiles.find(p => p.id === activeId) || profiles[0] || {};
            return Object.assign({}, getDefaultsByProvider(profile.provider || 'appwrite'), profile);
        }

        /** 儲存欄位到目前活躍設定檔 */
        function saveAppwriteConfig(fields) {
            const profiles = loadProfiles();
            const activeId = getActiveId();
            const idx = profiles.findIndex(p => p.id === activeId);
            if (idx >= 0) Object.assign(profiles[idx], fields);
            saveProfiles(profiles);
            // keep legacy key in sync for external consumers
            localStorage.setItem(APPWRITE_KEY, JSON.stringify(profiles[idx] || fields));
        }

        /* ── Provider definitions ── */
        const PROVIDERS = [
            {
                cat: 'PaaS 系列', items: [
                    { id: 'appwrite', icon: '☁️', name: 'Appwrite', done: true },
                    { id: 'supabase', icon: '🟢', name: 'Supabase', done: false },
                    { id: 'nhost', icon: '🔷', name: 'Nhost', done: false },
                    { id: 'sanity', icon: '🎯', name: 'Sanity', done: false },
                    { id: 'contentful', icon: '📦', name: 'Contentful', done: false },
                    { id: 'strapi', icon: '🚀', name: 'Strapi', done: false },
                    { id: 'back4app', icon: '🅱️', name: 'Back4App', done: false },
                    { id: 'xano', icon: '⚡', name: 'Xano', done: false },
                    { id: 'backendless', icon: '🔌', name: 'Backendless', done: false },
                ]
            },
            {
                cat: '只有資料庫', items: [
                    { id: 'sqlitecloud', icon: '🗄️', name: 'SQLite Cloud', done: false },
                    { id: 'motherduck', icon: '🦆', name: 'MotherDuck', done: false },
                    { id: 'mongodb', icon: '🍃', name: 'MongoDB', done: false },
                    { id: 'neon', icon: '💠', name: 'Neon', done: false },
                    { id: 'firebase', icon: '🔥', name: 'Firebase', done: false },
                    { id: '8base', icon: '8️⃣', name: '8base', done: false },
                ]
            },
            {
                cat: '只有雲端空間', items: [
                    { id: 'vercel', icon: '▲', name: 'Vercel', done: false },
                    { id: 'cloudflare', icon: '🌐', name: 'CloudFlare', done: false },
                ]
            },
        ];

        function renderSettings() {
            const cfg = getAppwriteConfig();
            const hasConfig = !!(cfg.endpoint && cfg.projectId);
            const selectedProvider = cfg.provider || 'appwrite';

            const panel = document.createElement('div');
            panel.className = 'settings-panel';

            /* Build provider picker HTML */
            const catsHtml = PROVIDERS.map(cat => `
                <div>
                    <div class="provider-cat-label">${cat.cat}</div>
                    <div class="provider-grid">
                        ${cat.items.map(p => `
                            <div class="provider-card${p.done ? '' : ' wip'}${p.id === selectedProvider ? ' active' : ''}"
                                 data-provider="${p.id}" title="${p.name}${p.done ? '' : '（尚未實作）'}">
                                ${!p.done ? '<span class="provider-wip-badge">🚧</span>' : ''}
                                <span class="provider-card-icon">${p.icon}</span>
                                <span class="provider-card-name">${p.name}</span>
                            </div>`).join('')}
                    </div>
                </div>`).join('');

            const isAppwrite = selectedProvider === 'appwrite';
            const selectedName = PROVIDERS.flatMap(c => c.items).find(p => p.id === selectedProvider)?.name || selectedProvider;

            /* Build profile tabs HTML */
            const profiles = loadProfiles();
            const activeId = getActiveId();
            const profileTabsHtml = profiles.map(prof => `
                <div class="profile-tab${prof.id === activeId ? ' active' : ''}" data-profile-id="${prof.id}">
                    <span class="profile-tab-name">${prof.name}</span>
                    <span class="profile-tab-del" data-del-id="${prof.id}" title="刪除此設定檔">✕</span>
                </div>`).join('');

            panel.innerHTML = `
        <div id="settingsToast"></div>

        <!-- Profile Bar -->
        <div class="profile-bar">
          <div class="profile-bar-header">
            <span class="profile-bar-label">📋 設定檔</span>

            <input type="file" id="profileImportFile" accept=".json" style="display:none" />
          </div>
          <div class="profile-tabs" id="profileTabs">
            ${profileTabsHtml}
            <button class="profile-add-btn" id="profileAddBtn" title="新增設定檔">＋</button>
          </div>
        </div>

        <!-- Provider Picker -->
        <div class="provider-picker">
          <div class="provider-picker-header">🗄️ 選擇後端平台</div>
          <div class="provider-body">${catsHtml}</div>
        </div>

        <!-- Appwrite 設定區塊 -->
        <div class="settings-section" id="awSection" style="${isAppwrite ? '' : 'display:none'}">
          <div class="settings-section-header">
            <div class="settings-section-icon">☁️</div>
            <div>
              <div class="settings-section-title">Appwrite 連線設定</div>
              <div class="settings-section-sub">Backend as a Service — 資料庫與儲存空間</div>
            </div>
            <span class="settings-conn-badge ${hasConfig ? 'connected' : 'disconnected'}" id="connBadge">
              ${hasConfig ? '✓ 已設定' : '未設定'}
            </span>
          </div>

          <div class="settings-body">
            <div class="settings-field">

                placeholder="例如：鋒兄"
                value="${cfg.nickname || ''}" />
            </div>

            <div class="settings-field">
              <label class="settings-label">Endpoint (端點)</label>
              <div class="settings-hint">例如：https://cloud.appwrite.io/v1</div>
              <input id="aw_endpoint" class="settings-input" type="url"
                placeholder="https://cloud.appwrite.io/v1"
                value="${cfg.endpoint || ''}" />
            </div>

            <div class="settings-field">
              <label class="settings-label">Project ID（專案 ID）</label>
              <input id="aw_project" class="settings-input" type="text"
                placeholder="xxxxxxxxxxxxxxxxxxxxxxxx"
                value="${cfg.projectId || ''}" />

            <div class="settings-field">
              <label class="settings-label">API Key（密鑰）</label>
              <div class="settings-input-row">
                <input id="aw_apikey" class="settings-input password" type="password"
                  placeholder="••••••••••••••••••••••••••••••••"
                  value="${cfg.apiKey || ''}" />

          <div class="settings-footer">
            <button class="btn btn-primary" id="saveBtn">💾 儲存設定</button>
            <button class="btn btn-ghost" id="testBtn">🔗 測試連線</button>
            <button class="btn btn-danger" id="clearBtn" style="margin-left:auto">🗑️ 清除</button>
          </div>
        </div>

        <!-- WIP notice (shown when a non-implemented provider is selected) -->
        <div class="settings-section" id="wipSection" style="${isAppwrite ? 'display:none' : ''}">
          <div class="provider-wip-notice">
            <div class="wip-big">🚧</div>
            <div class="wip-title" id="wipTitle">${selectedName} 尚未實作</div>
            <div style="font-size:12px;color:var(--text-muted);max-width:320px">
              此後端平台的整合功能正在規劃中，實作完成後將移除 🚧 提示。
            </div>
          </div>
        </div>
      `;

            return panel;
        }

        function bindSettingsEvents(panel) {
            const toast = panel.querySelector('#settingsToast');
            const awSection = panel.querySelector('#awSection');
            const wipSection = panel.querySelector('#wipSection');
            const wipTitle = panel.querySelector('#wipTitle');
            const profileTabs = panel.querySelector('#profileTabs');

            /* ── Helpers ── */
            const allProviders = PROVIDERS.flatMap(c => c.items);

            function showToast(type, msg) {
                toast.innerHTML = `<div class="settings-toast ${type}">${msg}</div>`;
                setTimeout(() => { toast.innerHTML = ''; }, 4000);
            }

            /* ── Fill form fields from a profile object ── */
            function fillFields(prof) {
                panel.querySelector('#aw_nickname').value = prof.nickname || '';
                panel.querySelector('#aw_endpoint').value = prof.endpoint || '';
                panel.querySelector('#aw_project').value = prof.projectId || '';
                panel.querySelector('#aw_apikey').value = prof.apiKey || '';
                // update provider cards
                const prov = prof.provider || 'appwrite';
                panel.querySelectorAll('.provider-card').forEach(c =>
                    c.classList.toggle('active', c.dataset.provider === prov));
                currentProvider = prov;
                if (prov === 'appwrite') {
                    awSection.style.display = '';
                    wipSection.style.display = 'none';
                } else {
                    awSection.style.display = 'none';
                    wipSection.style.display = '';
                    const info = allProviders.find(p => p.id === prov);
                    if (wipTitle) wipTitle.textContent = `${info?.name || prov} 尚未實作`;
                }
                // badge
                const connBadge = panel.querySelector('#connBadge');
                if (connBadge) {
                    const ok = !!(prof.endpoint && prof.projectId);
                    connBadge.className = `settings-conn-badge ${ok ? 'connected' : 'disconnected'}`;
                    connBadge.textContent = ok ? '✓ 已設定' : '未設定';
                }
            }

            /* ── Render profile tab list ── */
            function renderProfileTabs() {
                const profiles = loadProfiles();
                const activeId = getActiveId();
                profileTabs.innerHTML = profiles.map(prof => `
                    <div class="profile-tab${prof.id === activeId ? ' active' : ''}" data-profile-id="${prof.id}">
                        <span class="profile-tab-name">${prof.name}</span>
                        <span class="profile-tab-del" data-del-id="${prof.id}" title="刪除此設定檔">✕</span>
                    </div>`).join('') +
                    `<button class="profile-add-btn" id="profileAddBtn" title="新增設定檔">＋</button>`;
                bindProfileTabEvents();
            }

            /* ── Switch to a profile ── */
            function switchProfile(id) {
                setActiveId(id);
                const profiles = loadProfiles();
                const prof = profiles.find(p => p.id === id) || {};
                // highlight tab
                profileTabs.querySelectorAll('.profile-tab').forEach(t =>
                    t.classList.toggle('active', t.dataset.profileId === id));
                fillFields(Object.assign({}, getDefaultsByProvider(prof.provider || 'appwrite'), prof));
                refreshAvatar();
            }

            /* ── Bind profile tab click / delete / add / rename ── */
            function bindProfileTabEvents() {
                // click tab => switch
                profileTabs.querySelectorAll('.profile-tab').forEach(tab => {
                    tab.addEventListener('click', e => {
                        if (e.target.classList.contains('profile-tab-del')) return;
                        if (e.target.hasAttribute('contenteditable')) return;
                        switchProfile(tab.dataset.profileId);
                    });
                });

                // del button
                profileTabs.querySelectorAll('.profile-tab-del').forEach(btn => {
                    btn.addEventListener('click', e => {
                        e.stopPropagation();
                        const profiles = loadProfiles();
                        if (profiles.length <= 1) { showToast('error', '⚠️ 至少保留一個設定檔'); return; }
                        if (!confirm(`確定刪除「${profiles.find(p => p.id === btn.dataset.delId)?.name}」？`)) return;
                        const newProfiles = profiles.filter(p => p.id !== btn.dataset.delId);
                        saveProfiles(newProfiles);
                        if (getActiveId() === btn.dataset.delId) setActiveId(newProfiles[0].id);
                        renderProfileTabs();
                        switchProfile(getActiveId());
                    });
                });

                // double-click name => inline rename
                profileTabs.querySelectorAll('.profile-tab-name').forEach(nameEl => {
                    nameEl.addEventListener('dblclick', () => {
                        nameEl.contentEditable = 'true';
                        nameEl.focus();
                        const range = document.createRange();
                        range.selectNodeContents(nameEl);
                        window.getSelection().removeAllRanges();
                        window.getSelection().addRange(range);
                    });
                    nameEl.addEventListener('blur', () => {
                        nameEl.contentEditable = 'false';
                        const tab = nameEl.closest('.profile-tab');
                        const id = tab?.dataset.profileId;
                        const newName = nameEl.textContent.trim() || '未命名';
                        nameEl.textContent = newName;
                        const profiles = loadProfiles();
                        const p = profiles.find(pr => pr.id === id);
                        if (p) { p.name = newName; saveProfiles(profiles); }
                    });
                    nameEl.addEventListener('keydown', e => {
                        if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
                        if (e.key === 'Escape') { nameEl.blur(); }
                    });
                });

                // add button
                const addBtn = profileTabs.querySelector('#profileAddBtn');
                if (addBtn) {
                    addBtn.addEventListener('click', () => {
                        const profiles = loadProfiles();
                        const id = _newId();
                        const name = `新設定檔-${profiles.length + 1}`;
                        profiles.push({ id, name, provider: 'appwrite', nickname: '', endpoint: '', projectId: '', apiKey: '', bucket: '' });
                        saveProfiles(profiles);
                        setActiveId(id);
                        renderProfileTabs();
                        switchProfile(id);
                    });
                }
            }

            bindProfileTabEvents();

            /* ── Export all profiles ── */
            panel.querySelector('#profileExportBtn').addEventListener('click', () => {
                const profiles = loadProfiles();
                const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                const filename = `fengbrosystem-all-profiles-${date}.json`;
                const blob = new Blob([JSON.stringify(profiles, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.click();
                URL.revokeObjectURL(a.href);
                showToast('success', `✅ 已匯出 ${profiles.length} 個設定檔`);
            });

            /* ── Import profiles ── */
            const profileImportFile = panel.querySelector('#profileImportFile');
            panel.querySelector('#profileImportBtn').addEventListener('click', () => profileImportFile.click());
            profileImportFile.addEventListener('change', async () => {
                const file = profileImportFile.files[0];
                if (!file) return;
                profileImportFile.value = '';
                try {
                    const raw = await file.text();
                    const imported = JSON.parse(raw);
                    if (!Array.isArray(imported) || !imported.length) throw new Error('格式錯誤');
                    // ensure each profile has an id
                    imported.forEach(p => { if (!p.id) p.id = _newId(); });
                    const existing = loadProfiles();
                    let merged;
                    if (existing.length === 1 && !existing[0].endpoint && !existing[0].projectId) {
                        // only a blank profile exists — replace
                        merged = imported;
                    } else {
                        const choice = confirm(`將 ${imported.length} 個設定檔：\n\n[確定] 追加到現有設定檔\n[取消] 取消匯入`);
                        if (!choice) return;
                        // merge: skip duplicates by id
                        const existingIds = new Set(existing.map(p => p.id));
                        const newOnes = imported.filter(p => !existingIds.has(p.id));
                        merged = [...existing, ...newOnes];
                    }
                    saveProfiles(merged);
                    setActiveId(merged[0].id);
                    renderProfileTabs();
                    switchProfile(merged[0].id);
                    showToast('success', `✅ 已匯入 ${imported.length} 個設定檔`);
                } catch (e) {
                    showToast('error', `❌ 匯入失敗：${e.message}`);
                }
            });

            /* ── Provider card switches ── */
            let currentProvider = getAppwriteConfig().provider || 'appwrite';

            function switchProvider(id) {
                currentProvider = id;
                panel.querySelectorAll('.provider-card').forEach(card =>
                    card.classList.toggle('active', card.dataset.provider === id));
                const info = allProviders.find(p => p.id === id);
                if (id === 'appwrite') {
                    awSection.style.display = '';
                    wipSection.style.display = 'none';
                } else {
                    awSection.style.display = 'none';
                    wipSection.style.display = '';
                    if (wipTitle) wipTitle.textContent = `${info?.name || id} 尚未實作`;
                }
                // persist provider + seed missing fields from provider defaults
                const profiles = loadProfiles();
                const activeId = getActiveId();
                const prof = profiles.find(p => p.id === activeId) || {};
                const defaults = getDefaultsByProvider(id);
                const next = { provider: id };
                ['nickname', 'endpoint', 'projectId', 'apiKey', 'bucket'].forEach(k => {
                    if (!(prof[k] || '').trim() && defaults[k] !== undefined) next[k] = defaults[k];
                });
                saveAppwriteConfig(next);
                if (id === 'supabase') fillFields(Object.assign({}, defaults, prof, next));
            }

            panel.querySelectorAll('.provider-card').forEach(card => {
                card.addEventListener('click', () => switchProvider(card.dataset.provider));
            });

            /* ── Appwrite form controls ── */
            const eyeBtn = panel.querySelector('#eyeBtn');
            const saveBtn = panel.querySelector('#saveBtn');
            const testBtn = panel.querySelector('#testBtn');
            const clearBtn = panel.querySelector('#clearBtn');
            const connBadge = panel.querySelector('#connBadge');

            const getFields = () => ({
                nickname: panel.querySelector('#aw_nickname').value.trim(),
                endpoint: panel.querySelector('#aw_endpoint').value.trim().replace(/\/$/, ''),
                projectId: panel.querySelector('#aw_project').value.trim(),
                apiKey: panel.querySelector('#aw_apikey').value.trim(),
            });

            function setBadge(state, text) {
                connBadge.className = `settings-conn-badge ${state}`;
                connBadge.textContent = text;
            }

            eyeBtn.addEventListener('click', () => {
                const inp = panel.querySelector('#aw_apikey');
                const show = inp.type === 'password';
                inp.type = show ? 'text' : 'password';
                eyeBtn.textContent = show ? '🙈' : '👁️';
            });

            saveBtn.addEventListener('click', () => {
                const fields = getFields();
                if (!fields.endpoint || !fields.projectId) {
                    showToast('error', '⚠️ Endpoint 及 Project ID 為必填欄位');
                    return;
                }
                // auto-update profile name if it's still default-ish
                const profiles = loadProfiles();
                const activeId = getActiveId();
                const prof = profiles.find(p => p.id === activeId);
                if (prof && (prof.name.startsWith('新設定檔') || prof.name === 'Appwrite-default')) {
                    const provName = allProviders.find(p => p.id === currentProvider)?.name || currentProvider;
                    prof.name = `${provName}-${fields.nickname || 'user'}`;
                    saveProfiles(profiles);
                    renderProfileTabs();
                }
                saveAppwriteConfig({ ...fields, provider: currentProvider });
                setBadge('connected', '✓ 已設定');
                showToast('success', '✅ 設定已儲存至本機');
                refreshAvatar();
            });

            testBtn.addEventListener('click', async () => {
                const fields = getFields();
                if (!fields.endpoint || !fields.projectId) {
                    showToast('error', '⚠️ 請先填入 Endpoint 及 Project ID');
                    return;
                }
                setBadge('testing', '⏳ 測試中…');
                testBtn.disabled = true;
                try {
                    const res = await fetch(`${fields.endpoint}/locale`, {
                        signal: AbortSignal.timeout(8000),
                        headers: { 'X-Appwrite-Project': fields.projectId, 'Content-Type': 'application/json' },
                    });
                    if (res.status < 500) {
                        setBadge('connected', '✓ 連線成功');
                        showToast('success', `✅ 連線成功！Appwrite 端點回應 HTTP ${res.status}`);
                    } else {
                        setBadge('disconnected', '✗ 伺服器錯誤');
                        showToast('error', `⚠️ 伺服器回應 HTTP ${res.status}，請確認 Endpoint 是否正確`);
                    }
                } catch (e) {
                    setBadge('disconnected', '✗ 無法連線');
                    showToast('error', `❌ 連線失敗：${e.message}`);
                } finally {
                    testBtn.disabled = false;
                }
            });

            clearBtn.addEventListener('click', () => {
                if (!confirm('確定要清除此設定檔的 Appwrite 設定嗎？')) return;
                saveAppwriteConfig({ nickname: '', endpoint: '', projectId: '', apiKey: '' });
                ['#aw_nickname', '#aw_endpoint', '#aw_project', '#aw_apikey'].forEach(s =>
                    panel.querySelector(s).value = '');
                setBadge('disconnected', '未設定');
                showToast('success', '🗑️ 設定已清除');
            });
        }

        /* ══════════════════════════════════════════
           Appwrite REST Helper
        ══════════════════════════════════════════ */
        let _awDbId = null;

        async function awFetch(path, options = {}) {
            const cfg = getAppwriteConfig();
            if (!cfg.endpoint || !cfg.projectId)
                throw new Error('尚未設定 Appwrite 端點，請前往「設定」頁面');
            const { headers: extraHeaders, ...rest } = options;
            const res = await fetch(`${cfg.endpoint}${path}`, {
                ...rest,
                headers: {
                    'X-Appwrite-Project': cfg.projectId,
                    'X-Appwrite-Key': cfg.apiKey || '',
                    'Content-Type': 'application/json',
                    ...(extraHeaders || {}),
                },
                signal: rest.signal || AbortSignal.timeout(15000),
            });
            if (res.status === 204) return null;
            const json = await res.json();
            if (!res.ok) throw new Error(json.message || `HTTP ${res.status}`);
            return json;
        }

        async function awGetDbId() {
            if (_awDbId) return _awDbId;
            const data = await awFetch('/databases?limit=25');
            if (!data?.databases?.length)
                throw new Error('找不到任何資料庫，請確認 Appwrite 設定');
            _awDbId = data.databases[0].$id;
            return _awDbId;
        }

        /* 自動搜尋 subscription Collection ID（依名稱或 ID 匹配） */
        let _subColId = null;
        async function awGetSubColId() {
            if (_subColId) return _subColId;
            const db = await awGetDbId();
            // 嘗試直接用 'subscription' 作為 ID
            try {
                await awFetch(`/databases/${db}/collections/subscription`);
                _subColId = 'subscription';
                return _subColId;
            } catch { }
            // 找不到，列下所有 Collection 依名稱搜尋
            const list = await awFetch(`/databases/${db}/collections?limit=100`);
            const col = list?.collections?.find(c =>
                c.name?.toLowerCase() === 'subscription' ||
                c.$id?.toLowerCase() === 'subscription'
            );
            if (!col) throw new Error('找不到訂閱資料表，請在 Appwrite 建立名稱為「subscription」的 Collection');
            _subColId = col.$id;
            return _subColId;
        }

        /* ══════════════════════════════════════════
           Subscribe CRUD
        ══════════════════════════════════════════ */
        const PAGE_SIZE = 5000;

        /**
         * 游標分頁取訂閱記錄
         * @param {string|null} cursorAfter  - 往下一頁：上一批最後一筆的 $id
         * @param {string|null} cursorBefore - 往上一頁：上一批第一筆的 $id
         */
        async function fetchSubs(cursorAfter = null, cursorBefore = null) {
            const db = await awGetDbId();
            const col = await awGetSubColId();
            const queries = [
                `queries[]=${encodeURIComponent(JSON.stringify({ method: 'limit', values: [PAGE_SIZE] }))}`,
            ];
            if (cursorAfter)
                queries.push(`queries[]=${encodeURIComponent(JSON.stringify({ method: 'cursorAfter', values: [cursorAfter] }))}`);
            else if (cursorBefore)
                queries.push(`queries[]=${encodeURIComponent(JSON.stringify({ method: 'cursorBefore', values: [cursorBefore] }))}`);
            const data = await awFetch(`/databases/${db}/collections/${col}/documents?${queries.join('&')}`);
            return { documents: data?.documents ?? [], total: data?.total ?? 0 };
        }

        async function saveSub(formData, docId = null) {
            const db = await awGetDbId();
            const col = await awGetSubColId();
            if (docId) {
                return awFetch(`/databases/${db}/collections/${col}/documents/${docId}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ data: formData }),
                });
            }
            return awFetch(`/databases/${db}/collections/${col}/documents`, {
                method: 'POST',
                body: JSON.stringify({ documentId: 'unique()', data: formData }),
            });
        }

        async function deleteSub(docId) {
            const db = await awGetDbId();
            const col = await awGetSubColId();
            return awFetch(`/databases/${db}/collections/${col}/documents/${docId}`, { method: 'DELETE' });
        }

        /* ══════════════════════════════════════════
           Subscribe Page — Helpers
        ══════════════════════════════════════════ */
        function fmtDate(val) {
            if (!val) return '—';
            try { return new Date(val).toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' }); }
            catch { return val; }
        }

        function fmtPrice(price, currency) {
            if (price == null || price === '') return '—';
            const sym = { TWD: 'NT$', USD: '$', JPY: '¥', EUR: '€', GBP: '£', HKD: 'HK$', CNY: '¥', SGD: 'S$' };
            return (sym[currency] || (currency ? currency + ' ' : '')) + Number(price).toLocaleString();
        }

        function daysUntil(dateStr) {
            if (!dateStr) return null;
            return Math.ceil((new Date(dateStr) - Date.now()) / 86400000);
        }
