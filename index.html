<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <title>鋒兄系統</title>
    <meta name="description" content="鋒兄個人管理系統 - 涵蓋儀表、訂閱、筆記、音樂等多功能管理介面" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sidebar-width: 240px;
            --sidebar-collapsed: 68px;
            --bg-dark: #0d0f14;
            --bg-panel: #13161e;
            --bg-card: #1a1e2a;
            --bg-hover: #1f2436;
            --bg-active: rgba(99, 179, 237, 0.12);
            --border: rgba(255, 255, 255, 0.07);
            --accent: #63b3ed;
            --accent-2: #9f7aea;
            --text-primary: #e8eaf0;
            --text-secondary: #7a8199;
            --text-muted: #4a5068;
            --gradient-1: linear-gradient(135deg, #63b3ed 0%, #9f7aea 100%);
            --gradient-sidebar: linear-gradient(180deg, #0f1219 0%, #0d0f14 100%);
            --shadow-glow: 0 0 20px rgba(99, 179, 237, 0.15);
            --radius: 12px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html,
        body {
            height: 100%;
            font-family: 'Noto Sans TC', 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ── Layout ── */
        .app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            height: 100%;
            background: var(--gradient-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width var(--transition), min-width var(--transition);
            overflow: hidden;
            position: relative;
            z-index: 100;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
            min-width: var(--sidebar-collapsed);
        }

        /* Sidebar top glow line */
        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gradient-1);
            opacity: 0.6;
        }

        /* ── Logo / Brand ── */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 18px 18px;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 10px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: var(--shadow-glow);
            transition: transform var(--transition), box-shadow var(--transition);
        }

        .brand:hover .brand-icon {
            transform: scale(1.08);
            box-shadow: 0 0 28px rgba(99, 179, 237, 0.35);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            opacity: 1;
            transition: opacity var(--transition);
        }

        .sidebar.collapsed .brand-text {
            opacity: 0;
            pointer-events: none;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }

        .brand-sub {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.8px;
            margin-top: 1px;
        }

        /* ── Nav ── */
        .nav {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 0;
            scrollbar-width: none;
        }

        .nav::-webkit-scrollbar {
            display: none;
        }

        .nav-section {
            padding: 0 10px;
        }

        .nav-section+.nav-section {
            margin-top: 4px;
        }

        .nav-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 18px;
            opacity: 0.6;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background var(--transition), transform var(--transition);
            white-space: nowrap;
            overflow: hidden;
            position: relative;
            user-select: none;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            transform: translateX(2px);
        }

        .nav-item.active {
            background: var(--bg-active);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 3px;
            border-radius: 0 3px 3px 0;
            background: var(--gradient-1);
        }

        .nav-icon {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: var(--bg-card);
            transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
            border: 1px solid var(--border);
        }

        .nav-item:hover .nav-icon {
            background: var(--bg-hover);
            transform: scale(1.05);
        }

        .nav-item.active .nav-icon {
            background: rgba(99, 179, 237, 0.15);
            border-color: rgba(99, 179, 237, 0.3);
            box-shadow: 0 0 12px rgba(99, 179, 237, 0.2);
        }

        .nav-label {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: color var(--transition), opacity var(--transition);
            opacity: 1;
        }

        .sidebar.collapsed .nav-label {
            opacity: 0;
            pointer-events: none;
        }

        .nav-item.active .nav-label {
            color: var(--accent);
            font-weight: 600;
        }

        /* tooltip for collapsed state */
        .nav-item[data-tooltip] {
            position: relative;
        }

        .sidebar.collapsed .nav-item::after {
            content: attr(data-tooltip);
            position: absolute;
            left: calc(100% + 14px);
            top: 50%;
            transform: translateY(-50%) scale(0.9);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s, transform 0.15s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            z-index: 999;
        }

        .sidebar.collapsed .nav-item:hover::after {
            opacity: 1;
            transform: translateY(-50%) scale(1);
        }

        /* ── Toggle Button ── */
        .sidebar-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            border-top: 1px solid var(--border);
            cursor: pointer;
            transition: background var(--transition);
            user-select: none;
        }

        .sidebar-toggle:hover {
            background: var(--bg-hover);
        }

        .toggle-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 14px;
            transition: transform var(--transition), color var(--transition), background var(--transition);
        }

        .sidebar.collapsed .toggle-btn {
            transform: rotate(180deg);
        }

        .sidebar-toggle:hover .toggle-btn {
            background: var(--bg-hover);
            color: var(--accent);
        }

        /* ── Main Content ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-dark);
        }

        /* ── Topbar ── */
        .topbar {
            height: 60px;
            min-height: 60px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 15, 20, 0.8);
            backdrop-filter: blur(12px);
            justify-content: space-between;
        }

        .topbar-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-icon {
            font-size: 20px;
        }

        .topbar-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.3px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-badge {
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--bg-active);
            border: 1px solid rgba(99, 179, 237, 0.2);
            font-size: 11px;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: box-shadow var(--transition);
        }

        .avatar:hover {
            box-shadow: var(--shadow-glow);
        }

        /* ── Content Area ── */
        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 32px;
        }

        .content.full-page {
            align-items: flex-start;
            justify-content: flex-start;
            padding: 0;
        }

        .content-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            opacity: 0.25;
            pointer-events: none;
            animation: fadeIn 0.5s ease;
        }

        .placeholder-icon {
            font-size: 64px;
            filter: grayscale(1);
        }

        /* ── Page Panel (full-width pages) ── */
        .page-panel {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: contentFadeIn 0.3s ease;
        }

        .page-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.015);
            flex-shrink: 0;
        }

        .page-toolbar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            flex: 1;
        }

        .page-toolbar-count {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .page-body {
            flex: 1;
            overflow: auto;
            padding: 20px 24px;
        }

        /* ── Data Table ── */
        .data-table-wrap {
            width: 100%;
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table thead tr {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
        }

        .data-table th {
            padding: 10px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .data-table td {
            padding: 11px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            vertical-align: middle;
        }

        .data-table tbody tr:last-child td {
            border-bottom: none;
        }

        .data-table tbody tr:hover td {
            background: var(--bg-hover);
        }

        .data-table .td-name {
            color: var(--text-primary);
            font-weight: 500;
        }

        .data-table .td-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 12px;
        }

        .data-table .td-link:hover {
            text-decoration: underline;
        }

        .data-table .td-price {
            font-weight: 600;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid;
        }

        .status-badge.on {
            background: rgba(72, 187, 120, 0.1);
            border-color: rgba(72, 187, 120, 0.25);
            color: #68d391;
        }

        .status-badge.off {
            background: rgba(113, 128, 150, 0.1);
            border-color: rgba(113, 128, 150, 0.2);
            color: var(--text-muted);
        }

        .td-actions {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-muted);
            transition: all var(--transition);
        }

        .icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .icon-btn.danger:hover {
            background: rgba(252, 129, 74, 0.15);
            color: #fc8b4a;
            border-color: rgba(252, 129, 74, 0.3);
        }

        /* ── Spinner ── */
        .spinner-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 60px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 60px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .empty-state-icon {
            font-size: 40px;
            opacity: 0.3;
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeOverlay 0.2s ease;
        }

        @keyframes fadeOverlay {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 540px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.94) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-muted);
            transition: all var(--transition);
        }

        .modal-close:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-field.full {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        .form-label .required {
            color: #fc8b4a;
            margin-left: 2px;
        }

        .form-input,
        .form-select {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-input:focus,
        .form-select:focus {
            border-color: rgba(99, 179, 237, 0.4);
            box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.08);
        }

        .form-select {
            appearance: none;
            cursor: pointer;
        }

        .form-checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-checkbox {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
        }

        .placeholder-text {
            font-size: 15px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* ── Settings Panel ── */
        .settings-panel {
            width: 100%;
            max-width: 720px;
            animation: contentFadeIn 0.35s ease;
        }

        @keyframes contentFadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .settings-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .settings-section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .settings-section-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-active);
            border: 1px solid rgba(99, 179, 237, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .settings-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .settings-section-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .settings-conn-badge {
            margin-left: auto;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            border: 1px solid;
            transition: all var(--transition);
        }

        .settings-conn-badge.connected {
            background: rgba(72, 187, 120, 0.12);
            border-color: rgba(72, 187, 120, 0.3);
            color: #68d391;
        }

        .settings-conn-badge.disconnected {
            background: rgba(252, 129, 74, 0.1);
            border-color: rgba(252, 129, 74, 0.25);
            color: #fc8b4a;
        }

        .settings-conn-badge.testing {
            background: rgba(99, 179, 237, 0.1);
            border-color: rgba(99, 179, 237, 0.25);
            color: var(--accent);
        }

        .settings-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .settings-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .settings-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .settings-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: -2px;
        }

        .settings-input {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }

        .settings-input::placeholder {
            color: var(--text-muted);
        }

        .settings-input:focus {
            border-color: rgba(99, 179, 237, 0.4);
            box-shadow: 0 0 0 3px rgba(99, 179, 237, 0.08);
        }

        .settings-input.password {
            font-family: monospace;
            letter-spacing: 1px;
        }

        .settings-input-row {
            display: flex;
            gap: 8px;
        }

        .settings-input-row .settings-input {
            flex: 1;
        }

        .settings-eye-btn {
            width: 40px;
            min-width: 40px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 15px;
            color: var(--text-muted);
            transition: color var(--transition), border-color var(--transition);
        }

        .settings-eye-btn:hover {
            color: var(--accent);
            border-color: rgba(99, 179, 237, 0.3);
        }

        .settings-footer {
            display: flex;
            gap: 10px;
            padding: 14px 20px;
            border-top: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.015);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all var(--transition);
        }

        .btn-primary {
            background: var(--gradient-1);
            color: #fff;
            box-shadow: 0 2px 12px rgba(99, 179, 237, 0.25);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 20px rgba(99, 179, 237, 0.4);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: var(--bg-dark);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-danger {
            background: rgba(252, 129, 74, 0.1);
            color: #fc8b4a;
            border: 1px solid rgba(252, 129, 74, 0.2);
        }

        .btn-danger:hover {
            background: rgba(252, 129, 74, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .settings-toast {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12.5px;
            margin-bottom: 12px;
            animation: contentFadeIn 0.2s ease;
        }

        .settings-toast.success {
            background: rgba(72, 187, 120, 0.1);
            border: 1px solid rgba(72, 187, 120, 0.25);
            color: #68d391;
        }

        .settings-toast.error {
            background: rgba(252, 129, 74, 0.1);
            border: 1px solid rgba(252, 129, 74, 0.25);
            color: #fc8b4a;
        }

        /* ── Animations ── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 0.25;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-8px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .nav-item {
            animation: slideIn 0.3s ease both;
        }
    </style>
</head>

<body>
    <div class="app" id="app">

        <!-- ── Sidebar ── -->
        <aside class="sidebar" id="sidebar">

            <div class="brand" id="brandBtn" title="鋒兄系統">
                <div class="brand-icon">⚡</div>
                <div class="brand-text">
                    <div class="brand-name">鋒兄系統</div>
                    <div class="brand-sub">FENG BRO SYSTEM</div>
                </div>
            </div>

            <nav class="nav" id="nav">
                <div class="nav-section" id="navList"></div>
            </nav>

            <div class="sidebar-toggle" id="toggleBtn" title="收合選單">
                <div class="toggle-btn">◀</div>
            </div>

        </aside>

        <!-- ── Main ── -->
        <div class="main">

            <header class="topbar">
                <div class="topbar-title">
                    <span class="topbar-icon" id="topbarIcon">🏠</span>
                    <span class="topbar-name" id="topbarName">鋒兄首頁</span>
                </div>
                <div class="topbar-actions">
                    <span class="topbar-badge" id="topbarBadge">首頁</span>
                    <div class="avatar" title="鋒兄">鋒</div>
                </div>
            </header>

            <main class="content" id="contentArea">
                <div class="content-placeholder" id="defaultPlaceholder">
                    <div class="placeholder-icon" id="placeholderIcon">🏠</div>
                    <div class="placeholder-text" id="placeholderText">內容區域 — 尚待建置</div>
                </div>
            </main>

        </div>
    </div>

    <script>
        const MENU = [
            { id: 'home', label: '鋒兄首頁', icon: '🏠', badge: '首頁' },
            { id: 'dashboard', label: '鋒兄儀表', icon: '📊', badge: '儀表' },
            { id: 'subscribe', label: '鋒兄訂閱', icon: '📬', badge: '訂閱' },
            { id: 'food', label: '鋒兄食品', icon: '🍱', badge: '食品' },
            { id: 'notes', label: '鋒兄筆記', icon: '📝', badge: '筆記' },
            { id: 'common', label: '鋒兄常用', icon: '⭐', badge: '常用' },
            { id: 'images', label: '鋒兄圖片', icon: '🖼️', badge: '圖片' },
            { id: 'videos', label: '鋒兄影片', icon: '🎬', badge: '影片' },
            { id: 'music', label: '鋒兄音樂', icon: '🎵', badge: '音樂' },
            { id: 'docs', label: '鋒兄文件', icon: '📄', badge: '文件' },
            { id: 'podcast', label: '鋒兄播客', icon: '🎙️', badge: '播客' },
            { id: 'bank', label: '鋒兄銀行', icon: '🏦', badge: '銀行' },
            { id: 'routine', label: '鋒兄例行', icon: '🔄', badge: '例行' },
            { id: 'settings', label: '鋒兄設定', icon: '⚙️', badge: '設定' },
            { id: 'about', label: '鋒兄關於', icon: 'ℹ️', badge: '關於' },
        ];

        let activeId = 'home';
        let collapsed = false;

        const sidebar = document.getElementById('sidebar');
        const navList = document.getElementById('navList');
        const toggleBtn = document.getElementById('toggleBtn');
        const topbarIcon = document.getElementById('topbarIcon');
        const topbarName = document.getElementById('topbarName');
        const topbarBadge = document.getElementById('topbarBadge');
        const placeholderIcon = document.getElementById('placeholderIcon');
        const placeholderText = document.getElementById('placeholderText');

        function renderNav() {
            navList.innerHTML = '';
            MENU.forEach((item, i) => {
                // divider before settings & about
                if (i === 13) {
                    const div = document.createElement('div');
                    div.className = 'nav-divider';
                    navList.appendChild(div);
                }

                const el = document.createElement('div');
                el.className = 'nav-item' + (item.id === activeId ? ' active' : '');
                el.setAttribute('data-id', item.id);
                el.setAttribute('data-tooltip', item.label);
                el.style.animationDelay = `${i * 0.03}s`;
                el.innerHTML = `
          <div class="nav-icon">${item.icon}</div>
          <span class="nav-label">${item.label}</span>
        `;
                el.addEventListener('click', () => navigate(item.id));
                navList.appendChild(el);
            });
        }

        /* ── Appwrite Table Auto-mapping ── */
        const TABLE_MAP = {
            home: null,
            dashboard: null,
            subscribe: 'subscription',
            food: 'foods',
            notes: 'notes',
            common: 'commons',
            images: 'images',
            videos: 'videos',
            music: 'music',
            docs: 'documents',
            podcast: 'podcasts',
            bank: 'bank',
            routine: 'routines',
            settings: null,
            about: null,
        };

        /** 取得當前頁面對應的 Appwrite collection 名稱 */
        function getTableName(pageId) {
            return TABLE_MAP[pageId] || null;
        }

        /* ── Settings Panel ── */
        const APPWRITE_KEY = 'feng_appwrite_cfg';

        const APPWRITE_DEFAULTS = {
            endpoint: 'https://tor.cloud.appwrite.io/v1',
            projectId: '69836152003d00c0279a',
            apiKey: 'standard_69882a84f42f0170da80c05d2183cac2f71a531ca044b71f093ffbed3978bc73c721b6a15263a32fee437eaa15a81048795876100bd8eb31361592d0b69ec843a5a4e0d327386452b7292c09d99ffd42c899f63f06df86a071b58c738118efbe794a7de788e6e629623d26d510ff07757de942d7852739e0c409d52a19e553a2',
        };

        function loadAppwriteConfig() {
            try { return JSON.parse(localStorage.getItem(APPWRITE_KEY)) || {}; }
            catch { return {}; }
        }

        function saveAppwriteConfig(cfg) {
            localStorage.setItem(APPWRITE_KEY, JSON.stringify(cfg));
        }

        /** 取得有效設定（已儲存 > 預設） */
        function getAppwriteConfig() {
            const saved = loadAppwriteConfig();
            return Object.assign({}, APPWRITE_DEFAULTS, saved);
        }

        function renderSettings() {
            const cfg = getAppwriteConfig();
            const hasConfig = !!(cfg.endpoint && cfg.projectId);

            const panel = document.createElement('div');
            panel.className = 'settings-panel';
            panel.innerHTML = `
        <div id="settingsToast"></div>

        <!-- Appwrite 區塊 -->
        <div class="settings-section">
          <div class="settings-section-header">
            <div class="settings-section-icon">☁️</div>
            <div>
              <div class="settings-section-title">Appwrite 連線設定</div>
              <div class="settings-section-sub">Backend as a Service — 資料庫與儲存空間</div>
            </div>
            <span class="settings-conn-badge ${hasConfig ? 'connected' : 'disconnected'}" id="connBadge">
              ${hasConfig ? '✓ 已設定' : '未設定'}
            </span>
          </div>

          <div class="settings-body">
            <div class="settings-field">
              <label class="settings-label">Endpoint (端點)</label>
              <div class="settings-hint">例如：https://cloud.appwrite.io/v1</div>
              <input id="aw_endpoint" class="settings-input" type="url"
                placeholder="https://cloud.appwrite.io/v1"
                value="${cfg.endpoint || ''}" />
            </div>

            <div class="settings-field">
              <label class="settings-label">Project ID（專案 ID）</label>
              <input id="aw_project" class="settings-input" type="text"
                placeholder="xxxxxxxxxxxxxxxxxxxxxxxx"
                value="${cfg.projectId || ''}" />
            </div>

            <div class="settings-field">
              <label class="settings-label">API Key（密鑰）</label>
              <div class="settings-input-row">
                <input id="aw_apikey" class="settings-input password" type="password"
                  placeholder="••••••••••••••••••••••••••••••••"
                  value="${cfg.apiKey || ''}" />
                <button class="settings-eye-btn" id="eyeBtn" type="button" title="顯示/隱藏密鑰">👁️</button>
              </div>
            </div>


          </div>

          <div class="settings-footer">
            <button class="btn btn-primary" id="saveBtn">💾 儲存設定</button>
            <button class="btn btn-ghost" id="testBtn">🔗 測試連線</button>
            <button class="btn btn-danger" id="clearBtn" style="margin-left:auto">🗑️ 清除</button>
          </div>
        </div>
      `;

            return panel;
        }

        function bindSettingsEvents(panel) {
            const toast = panel.querySelector('#settingsToast');
            const eyeBtn = panel.querySelector('#eyeBtn');
            const saveBtn = panel.querySelector('#saveBtn');
            const testBtn = panel.querySelector('#testBtn');
            const clearBtn = panel.querySelector('#clearBtn');
            const connBadge = panel.querySelector('#connBadge');

            const getFields = () => ({
                endpoint: panel.querySelector('#aw_endpoint').value.trim().replace(/\/$/, ''),
                projectId: panel.querySelector('#aw_project').value.trim(),
                apiKey: panel.querySelector('#aw_apikey').value.trim(),
            });

            function showToast(type, msg) {
                toast.innerHTML = `<div class="settings-toast ${type}">${msg}</div>`;
                setTimeout(() => { toast.innerHTML = ''; }, 4000);
            }

            function setBadge(state, text) {
                connBadge.className = `settings-conn-badge ${state}`;
                connBadge.textContent = text;
            }

            // eye toggle
            eyeBtn.addEventListener('click', () => {
                const inp = panel.querySelector('#aw_apikey');
                const show = inp.type === 'password';
                inp.type = show ? 'text' : 'password';
                eyeBtn.textContent = show ? '🙈' : '👁️';
            });

            // save
            saveBtn.addEventListener('click', () => {
                const cfg = getFields();
                if (!cfg.endpoint || !cfg.projectId) {
                    showToast('error', '⚠️ Endpoint 及 Project ID 為必填欄位');
                    return;
                }
                saveAppwriteConfig(cfg);
                setBadge('connected', '✓ 已設定');
                showToast('success', '✅ 設定已儲存至本機');
            });

            // test
            testBtn.addEventListener('click', async () => {
                const cfg = getFields();
                if (!cfg.endpoint || !cfg.projectId) {
                    showToast('error', '⚠️ 請先填入 Endpoint 及 Project ID');
                    return;
                }
                setBadge('testing', '⏳ 測試中…');
                testBtn.disabled = true;
                try {
                    const url = `${cfg.endpoint}/health`;
                    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
                    if (res.ok) {
                        setBadge('connected', '✓ 連線成功');
                        showToast('success', `✅ 連線成功！Appwrite 服務正常運作`);
                    } else {
                        setBadge('disconnected', '✗ 回應異常');
                        showToast('error', `⚠️ 伺服器回應 HTTP ${res.status}`);
                    }
                } catch (e) {
                    setBadge('disconnected', '✗ 無法連線');
                    showToast('error', `❌ 連線失敗：${e.message}`);
                } finally {
                    testBtn.disabled = false;
                }
            });

            // clear
            clearBtn.addEventListener('click', () => {
                if (!confirm('確定要清除所有 Appwrite 設定嗎？')) return;
                localStorage.removeItem(APPWRITE_KEY);
                ['#aw_endpoint', '#aw_project', '#aw_apikey'].forEach(s => {
                    panel.querySelector(s).value = '';
                });
                setBadge('disconnected', '未設定');
                showToast('success', '🗑️ 設定已清除');
            });
        }

        /* ── Navigation ── */
        const contentArea = document.getElementById('contentArea');
        const defaultPlaceholder = document.getElementById('defaultPlaceholder');

        function navigate(id) {
            activeId = id;
            const item = MENU.find(m => m.id === id);
            if (!item) return;

            // update topbar
            topbarIcon.textContent = item.icon;
            topbarName.textContent = item.label;
            topbarBadge.textContent = item.badge;

            // clear previous panel
            const old = contentArea.querySelector('.settings-panel');
            if (old) old.remove();

            if (id === 'settings') {
                defaultPlaceholder.style.display = 'none';
                const panel = renderSettings();
                contentArea.appendChild(panel);
                bindSettingsEvents(panel);
            } else {
                defaultPlaceholder.style.display = '';
                document.getElementById('placeholderIcon').textContent = item.icon;
                document.getElementById('placeholderText').textContent = `${item.label} — 內容尚待建置`;
            }

            renderNav();
        }

        function toggleSidebar() {
            collapsed = !collapsed;
            sidebar.classList.toggle('collapsed', collapsed);
        }

        toggleBtn.addEventListener('click', toggleSidebar);
        document.getElementById('brandBtn').addEventListener('click', toggleSidebar);

        // init
        renderNav();
    </script>
</body>

</html>
